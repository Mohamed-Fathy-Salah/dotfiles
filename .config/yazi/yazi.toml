[mgr]
show_hidden = true
linemode = "size"
scrolloff = 10
mouse_events = ["click", "scroll", "drag"]
ratio = [1,2,3]

[preview]
max_width = 1920
max_height = 1080
image_backend = "sixel"

[opener]
wineexe = [
  { run = 'wine "$@"', desc = "Wine .exe", orphan = true},
]

html = [
  { run = '$BROWSER "$@"', desc = "Browser", orphan = true },
]

edit = [
  { run = '$EDITOR "$@"', desc = "Editor", block = true },
]

img = [
  { run = 'sxiv "$@"', desc = "Image", orphan = true },
]

media = [
  { run = 'mpv --force-window=yes "$@"', desc = "Media", orphan = true },
]

pdf = [
  { run = 'zathura "$@"', desc = "PDF", orphan = true },
]

libreoffice = [
  { run = 'libreoffice "$@"', desc = "LibreOffice", orphan = true},
]

fallback = [
  { run = '$OPENER "$@"', desc = "Fallback", orphan = true },
]

[open]
rules = [
  { mime = "application/*opendocument*", use = "libreoffice" },
  { mime = "application/*openxmlformats-officedocument*", use = "libreoffice" },
  { name = "*.exe", use = "wineexe" },
  { mime = "text/html", use = ["html", "edit"] },
  { mime = "text/*", use = "edit" },
  { mime = "application/javascript", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "image/*", use = "img" },
  { mime = "video/*", use = "media" },
  { mime = "audio/*", use = "media" },
  { mime = "application/pdf", use = "pdf" },
  { name = "*", use = "fallback" },
]

[[input.prepend_keymap]]
on   = "<Esc>"
run  = "close"
desc = "Cancel input"

[[plugin.prepend_fetchers]]
id  = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
id  = "git"
url = "*/"
run = "git"

[plugin]
prepend_preloaders = [
    # Office Documents
    { mime = "application/openxmlformats-officedocument.*", run = "office" },
    { mime = "application/oasis.opendocument.*", run = "office" },
    { mime = "application/ms-*", run = "office" },
    { mime = "application/msword", run = "office" },
    { name = "*.docx", run = "office" },
]

prepend_previewers = [
    # Office Documents
    { mime = "application/openxmlformats-officedocument.*", run = "office" },
    { mime = "application/oasis.opendocument.*", run = "office" },
    { mime = "application/ms-*", run = "office" },
    { mime = "application/msword", run = "office" },
    { name = "*.docx", run = "office" },
]
