[mgr]
prepend_keymap = [
# mount
    { on = ["m", "0"], run = 'shell --orphan -- simple-mtpfs /mnt/phone ', desc = "mnt phone" },
    { on = ["m", "1"], run = 'shell --orphan -- sudo mount UUID=f96a6eba-c952-432e-90f8-f26de0adaf88 /mnt/hdd/root && sudo chown "mofasa:mofasa" /mnt/hdd/root', desc = "mnt old root" },
    { on = ["m", "2"], run = 'shell --orphan -- sudo mount UUID=700a772a-56dc-41ea-8845-e4c5e05b8c86 /mnt/hdd/home && sudo chown "mofasa:mofasa" /mnt/hdd/home', desc = "mnt old home" },
    { on = ["m", "3"], run = 'shell --orphan -- sudo mount UUID=d07e3dd1-01a3-4654-a9e9-10d6fe2392d8 /mnt/hdd/tmp && sudo chown "mofasa:mofasa" /mnt/hdd/tmp', desc = "mnt old tmp" },

    { on = ["u", "0"], run = 'shell --orphan -- sudo umount /mnt/phone', desc = "umnt phone" },
    { on = ["u", "1"], run = 'shell --orphan -- sudo umount /mnt/hdd/root', desc = "umnt old root" },
    { on = ["u", "2"], run = 'shell --orphan -- sudo umount /mnt/hdd/home', desc = "umnt old home" },
    { on = ["u", "3"], run = 'shell --orphan -- sudo umount /mnt/hdd/tmp', desc = "umnt old tmp" },

# lazy
    { on = ["g", "l"], run = "shell --block -- lazygit", desc = "lazygit" },

# editor
    { on = ["e"], run = 'shell --block -- $EDITOR "$@"', desc = "edit" },
    { on = ["E"], run = 'shell --block -- sudo $EDITOR "$@"', desc = "sudo edit" },

# download
    { on = ["i"], run = """shell --orphan -- 
                        LINK="$(xclip -o -selection clipboard)"
                        case "$LINK" in
                            *git*) git clone "$LINK" && cd $(basename "$LINK" .git);;
                            *youtu*|*youtu.be*)
                                CHOICE=$(printf "audio\nvideo" | dmenu -p "Download as:")
                                case "$CHOICE" in
                                    audio)
                                        BASE=$(yt-dlp --no-download --print filename -o "%(title)s [%(id)s].%(ext)s" "$LINK" 2>/dev/null | head -1)
                                        R="$PWD/${BASE%.*}.resume"
                                        printf '#!/bin/sh\nyt-dlp -c --embed-metadata -x --audio-format mp3 -o "%s/%%(title)s [%%(id)s].%%(ext)s" "%s" && rm -f "%s"\n' "$PWD" "$LINK" "$R" > "$R" && chmod +x "$R"
                                        yt-dlp -c --embed-metadata -x --audio-format mp3 -o "$PWD/%(title)s [%(id)s].%(ext)s" "$LINK" && rm -f "$R";;
                                    video)
                                        RES=$(printf "1080\n720\n480\n360\n240\n144" | dmenu -p "Resolution:")
                                        [ -n "$RES" ] || exit
                                        FMT="bestvideo[height<=${RES}]+bestaudio/best[height<=${RES}]"
                                        BYTES=$(yt-dlp --no-download -f "$FMT" --print "%(filesize,filesize_approx)s" "$LINK" 2>/dev/null | awk '{s+=$1} END{print s+0}')
                                        HR=$(numfmt --to=iec --suffix=B "${BYTES:-0}" 2>/dev/null)
                                        [ "$(printf "yes\nno" | dmenu -p "Download ~${HR}?")" = yes ] || exit
                                        BASE=$(yt-dlp --no-download -f "$FMT" --print filename -o "%(title)s [%(id)s].%(ext)s" "$LINK" 2>/dev/null | head -1)
                                        R="$PWD/${BASE%.*}.resume"
                                        printf '#!/bin/sh\nyt-dlp -c --embed-metadata -f "%s" -o "%s/%%(title)s [%%(id)s].%%(ext)s" --merge-output-format mp4 "%s" && rm -f "%s"\n' "$FMT" "$PWD" "$LINK" "$R" > "$R" && chmod +x "$R"
                                        yt-dlp -c --embed-metadata -f "$FMT" -o "$PWD/%(title)s [%(id)s].%(ext)s" --merge-output-format mp4 "$LINK" && rm -f "$R";;
                                esac;;
                            *) wget "$LINK" ;; 
                        esac && notify-send "Download complete"
                    """, desc = "download clipboard link" },

# zip
    { 
      on = ["z","s"], 
      run = """shell --orphan -- 
          for f in "$@"; do
              realpath --relative-to="$PWD" "$f";
          done | xargs zip -r archive.zip""",
      desc = "zip selected"
    },
    { on = ["z", "i"], run = "shell --orphan -- zip -r archive.zip $(git ls-files --cached --others --exclude-standard)", desc = "zip ignore" },
    { on = ["Z"], run = """shell --orphan -- 
                                case $0 in
                                    *.tar.bz|*.tar.bz2|*.tbz|*.tbz2) tar xjvf "$0";;
                                    *.tar.gz|*.tgz) tar xzvf "$0";;
                                    *.tar.xz|*.txz) tar xJvf "$0";;
                                    *.zip) unzip "$0";;
                                    *.rar) unrar x "$0";;
                                    *.7z) 7z x "$0";;
                                esac
                            """, desc = "unzip" },

# background
    { on = ["b", "g"], run='shell --orphan -- cp "$0" ~/.config/wall.jpg && xwallpaper --zoom "$0"', desc = "set wallpaper"},

# dragon
    { on = ["o", "r"], run = 'shell --block -- dragon -a -x "$@"', desc = "dragon open (no hold)" },
    { on = ["o", "s"], run = 'shell --block -- dragon -a "$@"',     desc = "dragon open" },
    { on = ["o", "m"], run = 'shell --block -- dragon -t -x "$@"',  desc = "dragon move" },
    { 
      on = ["o", "c"], 
      run = """shell --orphan -- 
          for f in \"$@\"; do
              echo \"----$(realpath --relative-to=\"$PWD\" \"$f\")----\";
              cat \"$f\";
          done | xclip -selection clipboard""",
      desc = "copy files content"
    },
    { 
      on = ["o", "p"], 
      run = """shell --orphan -- 
          for f in "$@"; do
              kdeconnect-cli -d "$(kdeconnect-cli -a --id-only)" --share "$f";
          done""",
      desc = "send to phone"
    },

# terminal
    { on = "W", run = "tasks:show", desc = "Show task manager" },
    { on = "w", run = 'shell --block -- "$SHELL"', desc = "terminal" },
    { on = "<F5>", run = """shell --block --
        if ls docker-compose.yml 2>/dev/null | grep -q .; then
            docker-compose up -d
        elif ls *.js *.ts *.tsx 2>/dev/null | grep -q .; then
            npm run dev
        elif ls *.csproj *.cs *.sln 2>/dev/null | grep -q .; then
            dotnet run
        elif ls go.mod 2>/dev/null | grep -q .; then
            go run .
        else
            echo 'No recognized project files found.'
        fi
    """, desc = "run project" },
    { on = ["<F2>","l"], run  = 'shell --block -- claude' , desc = "Claude CLI" },
    { on = ["<F2>","c"], run  = 'shell --block -- copilot' , desc = "Copilot CLI" },
    { on = ["<F2>","g"], run  = 'shell --block -- agy' , desc = "Antigravity CLI" },
    { on = ["<F2>","a"], run  = 'shell --orphan antigravity' , desc = "Antigravity" },

# execute
    { on = "<F10>", run = '''shell --block --
      "$0" && notify-send -u low "$0" "Finished in $SECONDS seconds" || notify-send -u critical "$0" "Failed with exit code $?"
    ''', desc = "execute" },

# plugins
    { on = "l", run = 'plugin smart-enter', desc = "open directory/file" },
    { on = "<Enter>", run = 'open --interactive', desc = "open directory/file interactive" },
    { on = [ "1" ], run = "plugin relative-motions 1", desc = "Move in relative steps" },
    { on = [ "2" ], run = "plugin relative-motions 2", desc = "Move in relative steps" },
    { on = [ "3" ], run = "plugin relative-motions 3", desc = "Move in relative steps" },
    { on = [ "4" ], run = "plugin relative-motions 4", desc = "Move in relative steps" },
    { on = [ "5" ], run = "plugin relative-motions 5", desc = "Move in relative steps" },
    { on = [ "6" ], run = "plugin relative-motions 6", desc = "Move in relative steps" },
    { on = [ "7" ], run = "plugin relative-motions 7", desc = "Move in relative steps" },
    { on = [ "8" ], run = "plugin relative-motions 8", desc = "Move in relative steps" },
    { on = [ "9" ], run = "plugin relative-motions 9", desc = "Move in relative steps" },

# yank path
    { on = "y", run = [ """shell -- for f in "$@"; do echo "file://$f"; done | xclip -i -selection clipboard -t text/uri-list """, "yank" ], desc = "yank + copy uri to clipboard" },

# bookmarks
    {on = "M", run = "plugin bookmarks save", desc = "save bookmark"},
    {on = "f", run = "plugin bookmarks jump", desc = "jump to bookmark"},
    {on = '"', run = "plugin bookmarks delete", desc = "delete a bookmark"},
]
